    # Gridsome
  </h1><div class="posts"><div class="post-card content-box"><div class="post-card__header"><!----></div><div class="post-card__content"><h2 class="post-card__title">How to generate redirects in Gridsome</h2><p class="post-card__description">I've switched this site from a hosted Wordpress solution, to a static site generated by Gridsome. Here's a brief word on creating redirects for the old post URLs.</p><div class="post-meta post-card__meta">
   Posted 1. January 2020.
   <strong>2 min read.</strong></div><div class="post-tags post-card__tags"></div><a href="/how-to-generate-redirects-in-gridsome/" class="post-card__link">Link</a></div></div></div></main><footer class="footer"><span class="footer__copyright">Copyright © 2020. </span><span class="footer__links"></span></footer></div>
    <script>window.__INITIAL_STATE__={"data":{"tag":{"title":"Gridsome","belongsTo":{"edges":[{"node":{"title":"How to generate redirects in Gridsome","path":"\u002Fhow-to-generate-redirects-in-gridsome\u002F","date":"1. January 2020","timeToRead":2,"description":"I've switched this site from a hosted Wordpress solution, to a static site generated by Gridsome. Here's a brief word on creating redirects for the old post URLs.","content":"\u003Cp\u003EI've switched this site from a hosted Wordpress solution, to a static site generated by \u003Ca href=\"https:\u002F\u002Fgridsome.org\" target=\"_blank\" rel=\"nofollow noopener noreferrer\"\u003EGridsome\u003C\u002Fa\u003E. Here's a brief word on creating redirects for the old post URLs.\u003C\u002Fp\u003E\n\u003Cp\u003EThis build uses the \u003Ca href=\"https:\u002F\u002Fgridsome.org\u002Fplugins\u002F@gridsome\u002Fsource-filesystem\" target=\"_blank\" rel=\"nofollow noopener noreferrer\"\u003E@gridsome\u002Fsource-filesystem\u003C\u002Fa\u003E to  import the content from a set of Markdown files.  Each file exists as a page on this site, for example:\u003C\u002Fp\u003E\n\u003Cp\u003E\u003Ca href=\"http:\u002F\u002Fwww.andrewrowland.com\u002Fhow-to-generate-redirects-in-gridsome\u002F\" target=\"_blank\" rel=\"nofollow noopener noreferrer\"\u003Ehttp:\u002F\u002Fwww.andrewrowland.com\u002Fhow-to-generate-redirects-in-gridsome\u002F\u003C\u002Fa\u003E\u003C\u002Fp\u003E\n\u003Cp\u003EIn the site's previous incarnation they would be found on:\u003C\u002Fp\u003E\n\u003Cp\u003E\u003Ca href=\"http:\u002F\u002Fwww.andrewrowland.com\u002Farticle\u002Fdisplay\u002Fhow-to-generate-redirects-in-gridsome\u002F\" target=\"_blank\" rel=\"nofollow noopener noreferrer\"\u003Ehttp:\u002F\u002Fwww.andrewrowland.com\u002Farticle\u002Fdisplay\u002Fhow-to-generate-redirects-in-gridsome\u002F\u003C\u002Fa\u003E\u003C\u002Fp\u003E\n\u003Cp\u003EI doubt anyone would have bookmarked any, but it would be nice to retain the old URLs, and redirect to the appropriate pages.  Many hosts provide a mechanism to administer redirects.  I'm using \u003Ca href=\"https:\u002F\u002Fpages.github.com\" target=\"_blank\" rel=\"nofollow noopener noreferrer\"\u003EGithub Pages\u003C\u002Fa\u003E, which doesn't if you're not using Jekyll. If you are, \u003Ca href=\"https:\u002F\u002Fgithub.com\u002Fjekyll\u002Fjekyll-redirect-from#redirect-to\" target=\"_blank\" rel=\"nofollow noopener noreferrer\"\u003Ethis might be useful\u003C\u002Fa\u003E.\u003C\u002Fp\u003E\n\u003Cp\u003ESo for each post, we need to render an additional file for the old URL.  This requires an amendment to the \u003Cstrong\u003Egridsome.config.js\u003C\u002Fstrong\u003E configuration. For a Post type this involves switching to an array of config objects.  In this case, I've added an additional configuration for the redirect:\u003C\u002Fp\u003E\n\u003Cpre class=\"language-javascript\"\u003E\u003Ccode class=\"language-javascript\"\u003Emodule\u003Cspan class=\"token punctuation\"\u003E.\u003C\u002Fspan\u003Eexports \u003Cspan class=\"token operator\"\u003E=\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E\n  templates\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E\n    Post\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E[\u003C\u002Fspan\u003E\n      \u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E\n        path\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E \u003Cspan class=\"token string\"\u003E'\u002F:title'\u003C\u002Fspan\u003E\n      \u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E,\u003C\u002Fspan\u003E\n      \u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E\n        name\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E \u003Cspan class=\"token string\"\u003E'redirects'\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E,\u003C\u002Fspan\u003E\n        path\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E \u003Cspan class=\"token string\"\u003E'\u002Farticle\u002Fdisplay\u002F:title'\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E,\u003C\u002Fspan\u003E\n        component\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E \u003Cspan class=\"token string\"\u003E'.\u002Fsrc\u002Ftemplates\u002FRedirect.vue'\u003C\u002Fspan\u003E\n      \u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E\n    \u003Cspan class=\"token punctuation\"\u003E]\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E,\u003C\u002Fspan\u003E\n    Tag\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E \u003Cspan class=\"token string\"\u003E'\u002Ftag\u002F:id'\u003C\u002Fspan\u003E\n  \u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E\n\u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E\u003C\u002Fcode\u003E\u003C\u002Fpre\u003E\n\u003Cp\u003EIf you look at the component property I've added a template for the rendered file. It's a minimal template designed to output the appropriate meta tag to perform the redirect:\u003C\u002Fp\u003E\n\u003Cpre class=\"language-javascript\"\u003E\u003Ccode class=\"language-javascript\"\u003E\u003Cspan class=\"token operator\"\u003E&lt;\u003C\u002Fspan\u003Etemplate\u003Cspan class=\"token operator\"\u003E\u003E\u003C\u002Fspan\u003E\u003Cspan class=\"token operator\"\u003E&lt;\u003C\u002Fspan\u003E\u003Cspan class=\"token operator\"\u003E\u002F\u003C\u002Fspan\u003Etemplate\u003Cspan class=\"token operator\"\u003E\u003E\u003C\u002Fspan\u003E\n\n\u003Cspan class=\"token operator\"\u003E&lt;\u003C\u002Fspan\u003Escript\u003Cspan class=\"token operator\"\u003E\u003E\u003C\u002Fspan\u003E\n\u003Cspan class=\"token keyword\"\u003Eexport\u003C\u002Fspan\u003E \u003Cspan class=\"token keyword\"\u003Edefault\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E\n  \u003Cspan class=\"token function\"\u003EmetaInfo\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E(\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E)\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E\n    \u003Cspan class=\"token keyword\"\u003Ereturn\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E\n        title\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E \u003Cspan class=\"token template-string\"\u003E\u003Cspan class=\"token template-punctuation string\"\u003E`\u003C\u002Fspan\u003E\u003Cspan class=\"token string\"\u003ERedirecting to \u003C\u002Fspan\u003E\u003Cspan class=\"token interpolation\"\u003E\u003Cspan class=\"token interpolation-punctuation punctuation\"\u003E${\u003C\u002Fspan\u003E\u003Cspan class=\"token keyword\"\u003Ethis\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E.\u003C\u002Fspan\u003E$page\u003Cspan class=\"token punctuation\"\u003E.\u003C\u002Fspan\u003Epost\u003Cspan class=\"token punctuation\"\u003E.\u003C\u002Fspan\u003Epath\u003Cspan class=\"token interpolation-punctuation punctuation\"\u003E}\u003C\u002Fspan\u003E\u003C\u002Fspan\u003E\u003Cspan class=\"token template-punctuation string\"\u003E`\u003C\u002Fspan\u003E\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E,\u003C\u002Fspan\u003E\n        meta\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E[\u003C\u002Fspan\u003E\n            \u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E \u003Cspan class=\"token string\"\u003E'http-equiv'\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E \u003Cspan class=\"token string\"\u003E'refresh'\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E,\u003C\u002Fspan\u003E content\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E \u003Cspan class=\"token template-string\"\u003E\u003Cspan class=\"token template-punctuation string\"\u003E`\u003C\u002Fspan\u003E\u003Cspan class=\"token string\"\u003E0; URL=\u003C\u002Fspan\u003E\u003Cspan class=\"token interpolation\"\u003E\u003Cspan class=\"token interpolation-punctuation punctuation\"\u003E${\u003C\u002Fspan\u003E\u003Cspan class=\"token keyword\"\u003Ethis\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E.\u003C\u002Fspan\u003E$page\u003Cspan class=\"token punctuation\"\u003E.\u003C\u002Fspan\u003Epost\u003Cspan class=\"token punctuation\"\u003E.\u003C\u002Fspan\u003Epath\u003Cspan class=\"token interpolation-punctuation punctuation\"\u003E}\u003C\u002Fspan\u003E\u003C\u002Fspan\u003E\u003Cspan class=\"token template-punctuation string\"\u003E`\u003C\u002Fspan\u003E\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E\n        \u003Cspan class=\"token punctuation\"\u003E]\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E,\u003C\u002Fspan\u003E\n        link\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E[\u003C\u002Fspan\u003E\n            \u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E rel\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E \u003Cspan class=\"token string\"\u003E'canonical'\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E,\u003C\u002Fspan\u003E href\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E \u003Cspan class=\"token template-string\"\u003E\u003Cspan class=\"token template-punctuation string\"\u003E`\u003C\u002Fspan\u003E\u003Cspan class=\"token string\"\u003Ehttp:\u002F\u002Fwww.andrewrowland.com\u003C\u002Fspan\u003E\u003Cspan class=\"token interpolation\"\u003E\u003Cspan class=\"token interpolation-punctuation punctuation\"\u003E${\u003C\u002Fspan\u003E\u003Cspan class=\"token keyword\"\u003Ethis\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E.\u003C\u002Fspan\u003E$page\u003Cspan class=\"token punctuation\"\u003E.\u003C\u002Fspan\u003Epost\u003Cspan class=\"token punctuation\"\u003E.\u003C\u002Fspan\u003Epath\u003Cspan class=\"token interpolation-punctuation punctuation\"\u003E}\u003C\u002Fspan\u003E\u003C\u002Fspan\u003E\u003Cspan class=\"token template-punctuation string\"\u003E`\u003C\u002Fspan\u003E\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E\n        \u003Cspan class=\"token punctuation\"\u003E]\u003C\u002Fspan\u003E\n    \u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E\n  \u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E\n\u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E\n\u003Cspan class=\"token operator\"\u003E&lt;\u003C\u002Fspan\u003E\u003Cspan class=\"token operator\"\u003E\u002F\u003C\u002Fspan\u003Escript\u003Cspan class=\"token operator\"\u003E\u003E\u003C\u002Fspan\u003E\n\n\u003Cspan class=\"token operator\"\u003E&lt;\u003C\u002Fspan\u003Epage\u003Cspan class=\"token operator\"\u003E-\u003C\u002Fspan\u003Equery\u003Cspan class=\"token operator\"\u003E\u003E\u003C\u002Fspan\u003E\nquery \u003Cspan class=\"token function\"\u003ERedirect\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E(\u003C\u002Fspan\u003E\u003Cspan class=\"token parameter\"\u003E$id\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E \u003Cspan class=\"token constant\"\u003EID\u003C\u002Fspan\u003E\u003Cspan class=\"token operator\"\u003E!\u003C\u002Fspan\u003E\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E)\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E\n  post\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E \u003Cspan class=\"token function\"\u003Epost\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E(\u003C\u002Fspan\u003E\u003Cspan class=\"token parameter\"\u003Eid\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E $id\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E)\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E\n    path\n  \u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E\n\u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E\n\u003Cspan class=\"token operator\"\u003E&lt;\u003C\u002Fspan\u003E\u003Cspan class=\"token operator\"\u003E\u002F\u003C\u002Fspan\u003Epage\u003Cspan class=\"token operator\"\u003E-\u003C\u002Fspan\u003Equery\u003Cspan class=\"token operator\"\u003E\u003E\u003C\u002Fspan\u003E\u003C\u002Fcode\u003E\u003C\u002Fpre\u003E\n\u003Cp\u003ENow, when we run a build, two files are generated for each post.  One for the post itself, and one for the redirect.\u003C\u002Fp\u003E\n\u003Cp\u003EI'm new to the framework, so if anyone knows of a better way to achieve this, please \u003Ca href=\"mailto:mailATandrewrowlandDOTcom\" target=\"_blank\" rel=\"nofollow noopener noreferrer\"\u003Elet me know\u003C\u002Fa\u003E.\u003C\u002Fp\u003E\n\u003Cp\u003EI guess I could do something on the \u003Ca href=\"\u002F404\"\u003E404\u003C\u002Fa\u003E page to check for the \u003Ccode class=\"language-text\"\u003E\u002Fdisplay\u002Farticle\u003C\u002Fcode\u003E slug, and redirect. That would involve JavaScript, so this felt like a better solution.\u003C\u002Fp\u003E\n"}}]}}},"context":{}};(function(){var s;(s=document.currentScript||document.scripts[document.scripts.length-1]).parentNode.removeChild(s);}());</script><script src="/assets/js/app.2f7dcfed.js" defer></script><script src="/assets/js/page--src-templates-tag-vue.e966dcb1.js" defer></script>
