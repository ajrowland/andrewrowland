  </h1><div class="posts"><div class="post-card content-box"><div class="post-card__header"><!----></div><div class="post-card__content"><h2 class="post-card__title">Tridion Business Connector client</h2><p class="post-card__description">A bit of a niche entry this one. Will only be of interest to those who use Tridion, one of the more 'heavyweight' CMS solutions.</p><div class="post-meta post-card__meta">

    <script>window.__INITIAL_STATE__={"data":{"tag":{"title":"Perl","belongsTo":{"edges":[{"node":{"title":"Tridion Business Connector client","path":"\u002Ftridion-business-connector-client\u002F","date":"19. January 2009","timeToRead":2,"description":"A bit of a niche entry this one. Will only be of interest to those who use Tridion, one of the more 'heavyweight' CMS solutions.","content":"\u003Cp\u003EA bit of a niche entry this one. Will only be of interest to those who use Tridion, one of the more 'heavyweight' CMS solutions.\u003C\u002Fp\u003E\n\u003Cp\u003EI generally have a number of repetitive tasks that are extremely tedious to accomplish using the browser based GUI. So I constructed a simple \u003Ca href=\"\u002Fdownloads\u002Fbcclient.exe\"\u003Ecommand line tool\u003C\u002Fa\u003E that allows me to script tasks using a SOAP interface known as the Tridion Business Connector.\u003C\u002Fp\u003E\n\u003Cp\u003EThe client takes the following arguments:\u003C\u002Fp\u003E\n\u003Cpre class=\"language-shell\"\u003E\u003Ccode class=\"language-shell\"\u003Ebcclient.exe \u002Fh \u003Cspan class=\"token punctuation\"\u003E[\u003C\u002Fspan\u003Ehostname\u003Cspan class=\"token punctuation\"\u003E]\u003C\u002Fspan\u003E \u002Fu \u003Cspan class=\"token punctuation\"\u003E[\u003C\u002Fspan\u003Euser\u003Cspan class=\"token punctuation\"\u003E]\u003C\u002Fspan\u003E \u002Fp \u003Cspan class=\"token punctuation\"\u003E[\u003C\u002Fspan\u003Epassword\u003Cspan class=\"token punctuation\"\u003E]\u003C\u002Fspan\u003E \u002Fd \u003Cspan class=\"token punctuation\"\u003E[\u003C\u002Fspan\u003Edomain\u003Cspan class=\"token punctuation\"\u003E]\u003C\u002Fspan\u003E \u002Fx \u003Cspan class=\"token string\"\u003E\"[request XML]\"\u003C\u002Fspan\u003E\u003C\u002Fcode\u003E\u003C\u002Fpre\u003E\n\u003Cp\u003EWhy did I build this? Very useful when called via scripting tools. In my case, \u003Ca href=\"https:\u002F\u002Fwww.perl.org\u002F\" target=\"_blank\" rel=\"nofollow noopener noreferrer\"\u003EPerl\u003C\u002Fa\u003E.\u003C\u002Fp\u003E\n\u003Cp\u003EA simple Perl script that will return the XML for a Tridion Component would look something like this:\u003C\u002Fp\u003E\n\u003Cpre class=\"language-perl\"\u003E\u003Ccode class=\"language-perl\"\u003E\u003Cspan class=\"token keyword\"\u003Euse\u003C\u002Fspan\u003E strict\u003Cspan class=\"token punctuation\"\u003E;\u003C\u002Fspan\u003E\n\n\u003Cspan class=\"token keyword\"\u003Emy\u003C\u002Fspan\u003E \u003Cspan class=\"token variable\"\u003E$requestXML\u003C\u002Fspan\u003E \u003Cspan class=\"token operator\"\u003E=\u003C\u002Fspan\u003E \u003Cspan class=\"token string\"\u003Eq{\n    &lt;?xml version=\"1.0\" encoding=\"utf-16\"?\u003E\n    &lt;tcmapi:Message version=\"5.0\" from=\"AndyRowlandSoapClient\" failOnError=\"true\" xmlns:tcmapi=\"http:\u002F\u002Fwww.tridion.com\u002FContentManager\u002F5.0\u002FTCMAPI\"\u003E\n    &lt;tcmapi:Request ID=\"GetItemRequest\" preserve=\"true\"\u003E\n    &lt;tcmapi:GetItem itemURI=\"tcm:12-345\" \u002F\u003E\n    &lt;\u002Ftcmapi:Request\u003E\n    &lt;\u002Ftcmapi:Message\u003E\n}\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E;\u003C\u002Fspan\u003E\n\n\u003Cspan class=\"token variable\"\u003E$requestXML\u003C\u002Fspan\u003E \u003Cspan class=\"token operator\"\u003E=~\u003C\u002Fspan\u003E \u003Cspan class=\"token regex\"\u003Es\u002F\"\u002F\\\\\"\u002Fg\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E;\u003C\u002Fspan\u003E\n\n\u003Cspan class=\"token keyword\"\u003Emy\u003C\u002Fspan\u003E \u003Cspan class=\"token variable\"\u003E$responseXML\u003C\u002Fspan\u003E \u003Cspan class=\"token operator\"\u003E=\u003C\u002Fspan\u003E \u003Cspan class=\"token string\"\u003E`bcclient.exe \u002Fh MyTCMHost \u002Fu andyrowland \u002Fp mypassword \u002Fd MYDOMAIN \u002Fx \"$requestXML\"`\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E;\u003C\u002Fspan\u003E\n\n\u003Cspan class=\"token keyword\"\u003Eprint\u003C\u002Fspan\u003E \u003Cspan class=\"token variable\"\u003E$responseXML\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E;\u003C\u002Fspan\u003E\u003C\u002Fcode\u003E\u003C\u002Fpre\u003E\n\u003Cp\u003EWe could add a layer of abstraction, and wrap up the SOAP call within a subroutine, something like:\u003C\u002Fp\u003E\n\u003Cpre class=\"language-perl\"\u003E\u003Ccode class=\"language-perl\"\u003E\u003Cspan class=\"token function\"\u003E\u003Cspan class=\"token keyword\"\u003Esub\u003C\u002Fspan\u003E make_request\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E\n    \u003Cspan class=\"token keyword\"\u003Emy\u003C\u002Fspan\u003E \u003Cspan class=\"token variable\"\u003E$messageXML\u003C\u002Fspan\u003E \u003Cspan class=\"token operator\"\u003E=\u003C\u002Fspan\u003E shift\u003Cspan class=\"token punctuation\"\u003E;\u003C\u002Fspan\u003E\n    \u003Cspan class=\"token keyword\"\u003Emy\u003C\u002Fspan\u003E \u003Cspan class=\"token variable\"\u003E$requestXML\u003C\u002Fspan\u003E \u003Cspan class=\"token operator\"\u003E=\u003C\u002Fspan\u003E \u003Cspan class=\"token string\"\u003E'&lt;?xml version=\"1.0\" encoding=\"utf-16\"?\u003E&lt;tcmapi:Message version=\"5.0\" from=\"AndyRowlandsSoapClient\" failOnError=\"true\" xmlns:tcmapi=\"http:\u002F\u002Fwww.tridion.com\u002FContentManager\u002F5.0\u002FTCMAPI\"\u003E'\u003C\u002Fspan\u003E \u003Cspan class=\"token operator\"\u003E.\u003C\u002Fspan\u003E \u003Cspan class=\"token variable\"\u003E$messageXML\u003C\u002Fspan\u003E \u003Cspan class=\"token operator\"\u003E.\u003C\u002Fspan\u003E \u003Cspan class=\"token string\"\u003E'&lt;\u002Ftcmapi:Message\u003E'\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E;\u003C\u002Fspan\u003E\n\n    \u003Cspan class=\"token variable\"\u003E$requestXML\u003C\u002Fspan\u003E \u003Cspan class=\"token operator\"\u003E=~\u003C\u002Fspan\u003E \u003Cspan class=\"token regex\"\u003Es\u002F\"\u002F\\\\\"\u002Fg\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E;\u003C\u002Fspan\u003E\n\n    \u003Cspan class=\"token keyword\"\u003Emy\u003C\u002Fspan\u003E \u003Cspan class=\"token variable\"\u003E$responseXML\u003C\u002Fspan\u003E \u003Cspan class=\"token operator\"\u003E=\u003C\u002Fspan\u003E \u003Cspan class=\"token string\"\u003E`bcclient.exe \u002Fh MyTCMHost \u002Fu andyrowland \u002Fp mypassword \u002Fd MYDOMAIN \u002Fx \"$requestXML\"`\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E;\u003C\u002Fspan\u003E\n\n    \u003Cspan class=\"token keyword\"\u003Ereturn\u003C\u002Fspan\u003E XML\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003ESimple\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E:\u003C\u002Fspan\u003EXMLin\u003Cspan class=\"token punctuation\"\u003E(\u003C\u002Fspan\u003E\u003Cspan class=\"token variable\"\u003E$responseXML\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E)\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E;\u003C\u002Fspan\u003E\n\u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E\u003C\u002Fcode\u003E\u003C\u002Fpre\u003E\n\u003Cp\u003ENote the use the module XML::Simple to convert the response XML into a Perl data structure.\u003C\u002Fp\u003E\n\u003Cp\u003EWe can then create a succession of subroutines to perform a variery of routine tasks. To get a Tridion item:\u003C\u002Fp\u003E\n\u003Cpre class=\"language-perl\"\u003E\u003Ccode class=\"language-perl\"\u003E\u003Cspan class=\"token function\"\u003E\u003Cspan class=\"token keyword\"\u003Esub\u003C\u002Fspan\u003E get_item\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E\n    \u003Cspan class=\"token keyword\"\u003Emy\u003C\u002Fspan\u003E \u003Cspan class=\"token variable\"\u003E$URI\u003C\u002Fspan\u003E \u003Cspan class=\"token operator\"\u003E=\u003C\u002Fspan\u003E shift\u003Cspan class=\"token punctuation\"\u003E;\u003C\u002Fspan\u003E\n\n    \u003Cspan class=\"token keyword\"\u003Emy\u003C\u002Fspan\u003E \u003Cspan class=\"token variable\"\u003E$messageXML\u003C\u002Fspan\u003E \u003Cspan class=\"token operator\"\u003E=\u003C\u002Fspan\u003E \u003Cspan class=\"token string\"\u003Eqq{\n        &lt;tcmapi:Request ID=\"GetItemRequest\" preserve=\"true\"\u003E\n        &lt;tcmapi:GetItem itemURI=\"$URI\" \u002F\u003E\n        &lt;\u002Ftcmapi:Request\u003E\n    }\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E;\u003C\u002Fspan\u003E\n\n    \u003Cspan class=\"token keyword\"\u003Emy\u003C\u002Fspan\u003E \u003Cspan class=\"token variable\"\u003E$ref\u003C\u002Fspan\u003E \u003Cspan class=\"token operator\"\u003E=\u003C\u002Fspan\u003E make_request\u003Cspan class=\"token punctuation\"\u003E(\u003C\u002Fspan\u003E\u003Cspan class=\"token variable\"\u003E$messageXML\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E)\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E;\u003C\u002Fspan\u003E\n\n    \u003Cspan class=\"token keyword\"\u003Eif\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E(\u003C\u002Fspan\u003E\u003Cspan class=\"token variable\"\u003E$ref\u003C\u002Fspan\u003E\u003Cspan class=\"token operator\"\u003E-\u003E\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E\u003Cspan class=\"token string\"\u003E'tcmapi:Response'\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E\u003Cspan class=\"token string\"\u003E'success'\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E \u003Cspan class=\"token operator\"\u003Eeq\u003C\u002Fspan\u003E \u003Cspan class=\"token string\"\u003E'true'\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E)\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E\n        \u003Cspan class=\"token keyword\"\u003Ereturn\u003C\u002Fspan\u003E \u003Cspan class=\"token variable\"\u003E$ref\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E;\u003C\u002Fspan\u003E\n    \u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E \u003Cspan class=\"token keyword\"\u003Eelse\u003C\u002Fspan\u003E \u003Cspan class=\"token punctuation\"\u003E{\u003C\u002Fspan\u003E\n        \u003Cspan class=\"token keyword\"\u003Edie\u003C\u002Fspan\u003E \u003Cspan class=\"token string\"\u003E\"ERROR: Could not get item $URI\"\u003C\u002Fspan\u003E\u003Cspan class=\"token punctuation\"\u003E;\u003C\u002Fspan\u003E\n    \u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E\n\u003Cspan class=\"token punctuation\"\u003E}\u003C\u002Fspan\u003E\u003C\u002Fcode\u003E\u003C\u002Fpre\u003E\n"}}]}}},"context":{}};(function(){var s;(s=document.currentScript||document.scripts[document.scripts.length-1]).parentNode.removeChild(s);}());</script><script src="/assets/js/app.612f5266.js" defer></script><script src="/assets/js/page--src-templates-tag-vue.e52f8f65.js" defer></script>
